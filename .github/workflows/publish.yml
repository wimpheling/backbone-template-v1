name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, without the leading v
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Prepare requested version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            requested_version="${GITHUB_REF_NAME#v}"

            if [[ "$GITHUB_REF_NAME" != v* ]]; then
              echo "Release tags must start with v."
              exit 1
            fi
          else
            requested_version="$INPUT_VERSION"

            if [[ "${{ github.ref_type }}" != "branch" ]]; then
              echo "Manual publishing must run from a branch."
              exit 1
            fi

            if [[ "$requested_version" == v* ]]; then
              echo "Enter the version without the leading v."
              exit 1
            fi

            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/v${requested_version}" >/dev/null; then
              echo "Tag v${requested_version} already exists."
              exit 1
            fi
          fi

          if [[ "$package_version" != "$requested_version" ]]; then
            npm version "$requested_version" --no-git-tag-version
            package_version="$(node -p "require('./package.json').version")"
          fi

          if [[ "$package_version" != "$requested_version" ]]; then
            echo "package.json version ($package_version) does not match requested version ($requested_version)"
            exit 1
          fi

          echo "version=$requested_version" >> "$GITHUB_OUTPUT"

      # Validation runs in CI before changes reach main, so publish keeps the
      # release path short and only verifies the package contents.
      # - name: Test creator package
      #   run: npm test

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Check trusted publishing environment
        run: |
          node --version
          npm --version
          echo "GitHub repository: ${GITHUB_REPOSITORY}"
          echo "GitHub workflow: ${GITHUB_WORKFLOW}"
          echo "GitHub workflow ref: ${GITHUB_WORKFLOW_REF}"
          node -p "require('./package.json').repository.url"

          node - <<'NODE'
          const { execSync } = require("node:child_process")

          const npmVersion = execSync("npm --version", { encoding: "utf8" }).trim()
          const nodeVersion = process.versions.node
          const minimumNpm = [11, 5, 1]
          const minimumNode = [22, 14, 0]

          const parse = (version) => version.split(".").map((part) => Number.parseInt(part, 10))
          const isAtLeast = (actual, minimum) => {
            for (let index = 0; index < minimum.length; index += 1) {
              const actualPart = actual[index] ?? 0
              const minimumPart = minimum[index]

              if (actualPart > minimumPart) {
                return true
              }

              if (actualPart < minimumPart) {
                return false
              }
            }

            return true
          }

          if (!isAtLeast(parse(npmVersion), minimumNpm)) {
            throw new Error(`npm ${npmVersion} does not satisfy trusted publishing minimum 11.5.1`)
          }

          if (!isAtLeast(parse(nodeVersion), minimumNode)) {
            throw new Error(`Node ${nodeVersion} does not satisfy trusted publishing minimum 22.14.0`)
          }
          NODE

      # - name: Enable pnpm
      #   run: |
      #     corepack enable
      #     corepack prepare pnpm@10.22.0 --activate

      # - name: Setup Rust toolchains
      #   working-directory: template
      #   run: |
      #     rustup toolchain install 1.95.0 --profile minimal --component clippy
      #     rustup default 1.95.0
      #     rustup toolchain install nightly-2026-04-16 --component llvm-tools-preview --component rustc-dev

      # - name: Install validation tools
      #   working-directory: template
      #   run: |
      #     cargo install just --locked
      #     cargo install cargo-dylint dylint-link
      #     cargo install watchexec-cli --locked

      # - name: Install template dependencies
      #   working-directory: template
      #   run: pnpm install --frozen-lockfile

      # - name: Install Playwright Chromium
      #   working-directory: template
      #   run: pnpm --filter backbone-e2e exec playwright install --with-deps chromium

      # - name: Run template full validation
      #   working-directory: template
      #   run: just full-validation

      - name: Commit release version to main
        if: github.event_name == 'release'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- package.json; then
            echo "package.json already matches v${VERSION}; nothing to commit."
            exit 0
          fi

          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Release tag must point at the current main commit before the version can be pushed."
            exit 1
          fi

          git add package.json
          git commit -m "Release v${VERSION}"
          git push origin "HEAD:main"

      - name: Commit and create GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- package.json; then
            git add package.json
            git commit -m "Release v${VERSION}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "Release v${VERSION}"

      - name: Show GitHub OIDC claims
        run: |
          response="$(curl --fail-with-body \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"

          token="$(node -e "process.stdout.write(JSON.parse(process.argv[1]).value)" "$response")"
          payload="$(node -e "
            const token = process.argv[1]
            const payload = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')
            process.stdout.write(Buffer.from(payload, 'base64').toString('utf8'))
          " "$token")"

          node -e "
            const payload = JSON.parse(process.argv[1])
            const keys = [
              'iss',
              'aud',
              'repository',
              'repository_owner',
              'workflow',
              'workflow_ref',
              'job_workflow_ref',
              'ref',
              'ref_type',
              'event_name',
              'environment',
              'actor',
            ]

            for (const key of keys) {
              if (key in payload) {
                console.log(`${key}: ${payload[key]}`)
              }
            }
          " "$payload"

      - name: Publish package
        run: npm publish --provenance --access public
